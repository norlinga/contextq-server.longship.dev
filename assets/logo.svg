<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" aria-hidden="true">
  <defs>
    <linearGradient id="csg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="40" height="40" rx="10" fill="url(#csg)"/>
  <!-- Three queue bars (narrower than contextq to leave room for network arc) -->
  <rect x="9"  y="14.25" width="18" height="3.5" rx="1.75" fill="#ffffff" opacity="0.92"/>
  <rect x="9"  y="22.25" width="18" height="3.5" rx="1.75" fill="#ffffff" opacity="0.92"/>
  <rect x="9"  y="30.25" width="18" height="3.5" rx="1.75" fill="#ffffff" opacity="0.92"/>
  <!-- Chevron pop indicator -->
  <path d="M30 19 L37 24 L30 29" stroke="#fde68a" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Network broadcast arc suggesting remote delivery -->
  <path d="M33.5 16 Q42 24 33.5 32" stroke="#fde68a" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.5"/>
</svg>
